<div class="app-container">
  <header>
    <div class="logo">
      <span class="icon">🧠</span>
      <h1>OmniQuery <span>AI</span></h1>
    </div>
    <div class="status" [class.online]="!isLoading">
      {{ isLoading ? (currentStatus || 'Agent is thinking...') : 'Agent is Online' }}
    </div>
  </header>

  <main class="chat-container">
    <div class="chat-messages">
      <div *ngFor="let msg of messages; let i = index; let last = last" class="message-wrapper" [class.user]="msg.sender === 'user'">
        <!-- Show bubble if it has text -->
        <div class="message-bubble" *ngIf="msg.text">
          <div class="message-actions" *ngIf="msg.sender === 'agent'">
            <button class="viz-btn" (click)="toggleDataTable(i)" *ngIf="msg.results" [class.active]="msg.showDataTable" title="View Raw Data">
              <span class="icon">{{ msg.showDataTable ? '📝' : '🔢' }}</span>
              {{ msg.showDataTable ? 'Show Text' : 'View Table' }}
            </button>
            <button class="viz-btn" (click)="toggleVisualization(i)" [class.active]="msg.showChart" title="Visualize Data" *ngIf="msg.hasTable">
              <span class="icon">{{ msg.showChart ? '📋' : '📊' }}</span>
              {{ msg.showChart ? 'Show Table' : 'Visualize' }}
            </button>
            
            <!-- Chart Type Selection Buttons -->
            <div class="chart-type-buttons" *ngIf="msg.showChart">
              <button class="chart-type-btn" (click)="changeChartType(i, 'bar')" [class.active]="msg.chartType === 'bar' || !msg.chartType">📊 Bar</button>
              <button class="chart-type-btn" (click)="changeChartType(i, 'horizontalBar')" [class.active]="msg.chartType === 'horizontalBar'">📋 H-Bar</button>
              <button class="chart-type-btn" (click)="changeChartType(i, 'line')" [class.active]="msg.chartType === 'line'">📈 Line</button>
              <button class="chart-type-btn" (click)="changeChartType(i, 'area')" [class.active]="msg.chartType === 'area'">🏔️ Area</button>
              <button class="chart-type-btn" (click)="changeChartType(i, 'pie')" [class.active]="msg.chartType === 'pie'">🥧 Pie</button>
              <button class="chart-type-btn" (click)="changeChartType(i, 'doughnut')" [class.active]="msg.chartType === 'doughnut'">🍩 Doughnut</button>
            </div>
          </div>

          <div class="message-content" *ngIf="!msg.showChart && !msg.showDataTable" [innerHTML]="msg.text | markdown"></div>
          
          <div class="data-table-container" *ngIf="msg.results && msg.showDataTable">
            <table class="result-table">
              <thead>
                <tr>
                  <th *ngFor="let col of getColumns(msg.results)">{{ col }}</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let row of msg.results">
                  <td *ngFor="let col of getColumns(msg.results)">{{ row[col] }}</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="chart-container" *ngIf="msg.showChart">
            <canvas #chartCanvas [id]="'chart-' + i"></canvas>
            <div *ngIf="!msg.chartData" class="chart-placeholder">
              <span class="icon">⚠️</span>
              <p>This table cannot be visualized as a chart.</p>
              <button (click)="msg.showChart = false">Back to Table</button>
            </div>
          </div>

          <div class="message-meta" *ngIf="msg.text">{{ msg.timestamp | date:'shortTime' }}</div>
        </div>
      </div>
      <div *ngIf="isLoading && !currentStatus" class="message-wrapper">
        <div class="message-bubble loading">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>

    </div>

    <footer class="input-area">
      <div class="input-wrapper">
        <input type="text" [(ngModel)]="userMessage" (keyup.enter)="sendMessage()"
          placeholder="Ask about Users or Orders data..." [disabled]="isLoading">
        <button (click)="sendMessage()" [disabled]="isLoading || !userMessage.trim()">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </footer>
  </main>
</div>
